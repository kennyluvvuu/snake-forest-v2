services:
    backend:
        build: backend
        container_name: backend-bun
        # ports:
        # - "8080:8080"
        depends_on:
            - db
        env_file:
            - .env
        volumes:
            - ./backend:/app
            - uploads_data:/app/uploads

    nginx:
        image: nginx:latest
        container_name: nginx-proxy
        ports:
            - "80:80"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
            - uploads_data:/var/www/uploads:ro
        depends_on:
            - backend

    db:
        image: mongo:latest
        container_name: mongo-db
        ports:
            - "27017:27017"
        env_file:
            - .env
        environment:
            - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER}
            - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWD}
            - MONGO_INITDB_DATABASE=${MONGODB_DB}
        volumes:
            - ./mongo-data:/data/db

    bot:
        build: admin_bot
        container_name: admin_bot
        env_file:
            - .env
        depends_on:
            - backend
            - nginx
        extra_hosts:
            - "host.docker.internal:host-gateway"
volumes:
    uploads_data:
